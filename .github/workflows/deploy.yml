name: Deploy Flutter Web to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode dari GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup environment Flutter di server GitHub
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Download package dan Build Flutter Web
      - name: Install Dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --base-href=/app/

      # 4.5. Setup Landing Page
      # Flutter app masuk ke subfolder /app/ agar URL bersih (tanpa .html)
      # Landing page jadi index.html di root
      - name: Setup Landing Page
        run: |
          mkdir -p build/temp_app
          mv build/web/* build/temp_app/
          mkdir -p build/web/app
          mv build/temp_app/* build/web/app/
          rmdir build/temp_app
          cp web/landing.html build/web/index.html
          cp web/landing.css build/web/landing.css
          cp web/favicon.png build/web/favicon.png 2>/dev/null || true
          mkdir -p build/web/assets
          cp -r web/assets/* build/web/assets/ 2>/dev/null || true

      # 5. Upload file hasil build ke Droplet DigitalOcean
      - name: Deploy to Server via SFTP
        uses: AppleBoy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "build/web/*"
          target: "/var/www/html"
          strip_components: 2
          overwrite: true


